<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة الأصدقاء</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* صفحة تسجيل الدخول */
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: #667eea;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .error {
            color: #e53e3e;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        /* صفحة الدردشة */
        .chat-page {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 1200px;
            min-height: 600px;
            display: none;
        }

        .chat-header {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: #667eea;
        }

        .chats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .chat-card {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            height: 450px;
            display: flex;
            flex-direction: column;
        }

        .chat-card-header {
            background: #764ba2;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-card-header .online {
            width: 10px;
            height: 10px;
            background: #48bb78;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }

        .delete-btn {
            background: #f56565;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #c53030;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
        }

        .my-message {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .other-message {
            align-self: flex-start;
            background: #e2e8f0;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .message small {
            display: block;
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .input-area {
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-area button:hover {
            background: #5a67d8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-messages {
            text-align: center;
            color: #a0aec0;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="login-box">
        <h2>🔐 دخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول</button>
        <div id="loginError" class="error"></div>
    </div>

    <!-- صفحة الدردشة -->
    <div id="chatPage" class="chat-page">
        <div class="chat-header">
            <h3>
                <span>👋 مرحباً</span>
                <span id="currentUser"></span>
            </h3>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
        <div class="chats-container" id="chatsContainer"></div>
    </div>

    <script>
        // 🔐 بيانات المستخدمين (كلمات مرور قوية ومختلفة)
        const USERS = {
            Omar: 'Omar@2024#Secure',
            Marwan: 'Marwan!789$Strong',
            Ibrahim: 'Ibrahim*456%Safe'
        };

        let currentUser = null;

        // عناصر الصفحة
        const loginPage = document.getElementById('loginPage');
        const chatPage = document.getElementById('chatPage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const currentUserSpan = document.getElementById('currentUser');
        const chatsContainer = document.getElementById('chatsContainer');

        // دوال التخزين المحلي
        function getChatKey(user1, user2) {
            return [user1, user2].sort().join('_');
        }

        function getMessages(user1, user2) {
            const key = getChatKey(user1, user2);
            const messages = localStorage.getItem(key);
            return messages ? JSON.parse(messages) : [];
        }

        function saveMessages(user1, user2, messages) {
            const key = getChatKey(user1, user2);
            localStorage.setItem(key, JSON.stringify(messages));
        }

        function addMessage(sender, receiver, text) {
            if (!text.trim()) return;

            const message = {
                text: text,
                sender: sender,
                time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
            };

            const messages = getMessages(sender, receiver);
            messages.push(message);
            saveMessages(sender, receiver, messages);
        }

        function deleteChat(user1, user2) {
            if (confirm('هل تريد حذف كل الرسائل؟')) {
                const key = getChatKey(user1, user2);
                localStorage.removeItem(key);
                loadChats();
            }
        }

        // تحميل وعرض الدردشات
        function loadChats() {
            if (!currentUser) return;

            const otherUsers = Object.keys(USERS).filter(u => u !== currentUser);
            
            let html = '';
            
            otherUsers.forEach(other => {
                const messages = getMessages(currentUser, other);
                
                html += `
                    <div class="chat-card">
                        <div class="chat-card-header">
                            <div>
                                <span class="online"></span>
                                ${other}
                            </div>
                            <button class="delete-btn" onclick="deleteChat('${currentUser}', '${other}')">
                                حذف
                            </button>
                        </div>
                        <div class="messages" id="messages-${other}">
                            ${renderMessages(messages, other)}
                        </div>
                        <div class="input-area">
                            <input type="text" id="input-${other}" placeholder="اكتب رسالة..." 
                                   onkeypress="if(event.key==='Enter') sendMessage('${other}')">
                            <button onclick="sendMessage('${other}')">إرسال</button>
                        </div>
                    </div>
                `;
            });

            chatsContainer.innerHTML = html;
            
            otherUsers.forEach(other => {
                const msgsDiv = document.getElementById(`messages-${other}`);
                if (msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });
        }

        function renderMessages(messages, otherUser) {
            if (!messages || messages.length === 0) {
                return '<div class="no-messages">💬 لا توجد رسائل بعد</div>';
            }

            return messages.map(msg => {
                const isMine = msg.sender === currentUser;
                return `
                    <div class="message ${isMine ? 'my-message' : 'other-message'}">
                        ${msg.text}
                        <small>${msg.time}</small>
                    </div>
                `;
            }).join('');
        }

        // إرسال رسالة
        function sendMessage(receiver) {
            const input = document.getElementById(`input-${receiver}`);
            const text = input.value.trim();
            
            if (text) {
                addMessage(currentUser, receiver, text);
                input.value = '';
                loadChats();
            }
        }

        // تسجيل الدخول
        function handleLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (USERS[username] && USERS[username] === password) {
                currentUser = username;
                sessionStorage.setItem('user', currentUser);
                
                loginPage.style.display = 'none';
                chatPage.style.display = 'block';
                currentUserSpan.textContent = currentUser;
                
                loadChats();
                
                // تحديث كل 3 ثواني
                setInterval(() => {
                    if (currentUser) loadChats();
                }, 3000);
            } else {
                loginError.textContent = '❌ اسم مستخدم أو كلمة مرور خطأ';
            }
        }

        // تسجيل الخروج
        function logout() {
            currentUser = null;
            sessionStorage.removeItem('user');
            loginPage.style.display = 'block';
            chatPage.style.display = 'none';
            usernameInput.value = '';
            passwordInput.value = '';
            loginError.textContent = '';
        }

        // التحقق من الجلسة
        function checkSession() {
            const savedUser = sessionStorage.getItem('user');
            if (savedUser && USERS[savedUser]) {
                currentUser = savedUser;
                loginPage.style.display = 'none';
                chatPage.style.display = 'block';
                currentUserSpan.textContent = currentUser;
                loadChats();
                
                setInterval(() => {
                    if (currentUser) loadChats();
                }, 3000);
            }
        }

        // بدء التطبيق
        checkSession();
    </script>
</body>
</html>
