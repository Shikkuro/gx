<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة الثلاثة - بدون مسح</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #2b3a4a, #1a2a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        .login-box input:focus {
            border-color: #3498db;
            outline: none;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .login-box button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
        }
        .chat-page {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 1100px;
            min-height: 600px;
            display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .chat-header {
            background: #3498db;
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 {
            font-size: 22px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .chats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }
        .chat-card {
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            height: 450px;
            display: flex;
            flex-direction: column;
        }
        .chat-card-header {
            background: #34495e;
            color: white;
            padding: 15px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
        }
        .my-message {
            align-self: flex-end;
            background: #3498db;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .other-message {
            align-self: flex-start;
            background: #ecf0f1;
            color: #2c3e50;
            border-bottom-left-radius: 5px;
        }
        .message small {
            display: block;
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        .input-area input:focus {
            border-color: #3498db;
            outline: none;
        }
        .input-area button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .no-messages {
            text-align: center;
            color: #95a5a6;
            margin-top: 50px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #3498db;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 700px) {
            .chats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="login-box">
        <h2>🔐 دخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول</button>
        <div id="loginError" class="error"></div>
    </div>

    <!-- صفحة الدردشة -->
    <div id="chatPage" class="chat-page">
        <div class="chat-header">
            <h3>👋 مرحباً <span id="currentUser"></span></h3>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
        <div id="loading" class="loading" style="display: none;">⏳ جاري تحميل الرسائل...</div>
        <div class="chats-grid" id="chatsGrid"></div>
    </div>

    <script>
        // ========== 🔥 رابط MockAPI الخاص بك ==========
        const MOCKAPI_URL = 'https://69afaf66c63dd197feb9d08c.mockapi.io/messages';
        
        // ========== بيانات المستخدمين ==========
        const USERS = {
            Omar: 'Omar@2024#Secure',
            Marwan: 'Marwan!789$Strong',
            Ibrahim: 'Ibrahim*456%Safe'
        };

        let currentUser = null;
        let lastMessageCount = {}; // لنتتبع عدد الرسائل

        // عناصر الصفحة
        const loginPage = document.getElementById('loginPage');
        const chatPage = document.getElementById('chatPage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const currentUserSpan = document.getElementById('currentUser');
        const chatsGrid = document.getElementById('chatsGrid');
        const loading = document.getElementById('loading');

        // ========== دوال MockAPI ==========
        async function getMessages() {
            try {
                const response = await fetch(MOCKAPI_URL);
                return await response.json();
            } catch (error) {
                console.error('خطأ في جلب الرسائل:', error);
                return [];
            }
        }

        async function sendMessageToAPI(message) {
            try {
                await fetch(MOCKAPI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });
            } catch (error) {
                console.error('خطأ في إرسال الرسالة:', error);
            }
        }

        async function deleteMessagesFromAPI(chatId) {
            try {
                const messages = await getMessages();
                const toDelete = messages.filter(m => m.chatId === chatId);
                
                for (const msg of toDelete) {
                    await fetch(`${MOCKAPI_URL}/${msg.id}`, {
                        method: 'DELETE'
                    });
                }
            } catch (error) {
                console.error('خطأ في حذف الرسائل:', error);
            }
        }

        // ========== دوال الدردشة ==========
        function getChatId(user1, user2) {
            return [user1, user2].sort().join('-');
        }

        function filterMessagesByChat(messages, chatId) {
            return messages.filter(m => m.chatId === chatId)
                          .sort((a, b) => a.createdAt - b.createdAt);
        }

        // حفظ النص اللي كتبته
        function saveInputValue(receiver, value) {
            sessionStorage.setItem(`input_${currentUser}_${receiver}`, value);
        }

        function getInputValue(receiver) {
            return sessionStorage.getItem(`input_${currentUser}_${receiver}`) || '';
        }

        async function loadChats(keepInputs = true) {
            if (!currentUser) return;
            
            // احفظ النصوص الحالية
            const inputs = {};
            if (keepInputs) {
                const others = Object.keys(USERS).filter(u => u !== currentUser);
                others.forEach(other => {
                    const input = document.getElementById(`input-${other}`);
                    if (input) {
                        inputs[other] = input.value;
                    }
                });
            }
            
            loading.style.display = 'block';
            const messages = await getMessages();
            loading.style.display = 'none';
            
            const others = Object.keys(USERS).filter(u => u !== currentUser);
            
            let html = '';
            
            for (const other of others) {
                const chatId = getChatId(currentUser, other);
                const chatMessages = filterMessagesByChat(messages, chatId);
                
                html += `
                    <div class="chat-card">
                        <div class="chat-card-header">
                            <span>💬 ${other}</span>
                            <button class="delete-btn" onclick="deleteChat('${other}')">🗑️ حذف</button>
                        </div>
                        <div class="messages" id="msgs-${other}">
                            ${renderMessages(chatMessages)}
                        </div>
                        <div class="input-area">
                            <input type="text" id="input-${other}" placeholder="اكتب رسالة..." 
                                   value="${inputs[other] || getInputValue(other)}"
                                   oninput="saveInputValue('${other}', this.value)"
                                   onkeypress="if(event.key==='Enter') sendMessage('${other}')">
                            <button onclick="sendMessage('${other}')">إرسال</button>
                        </div>
                    </div>
                `;
            }
            
            chatsGrid.innerHTML = html;
            
            // تمرير للأسفل
            others.forEach(other => {
                const div = document.getElementById(`msgs-${other}`);
                if (div) div.scrollTop = div.scrollHeight;
            });
        }

        function renderMessages(messages) {
            if (!messages || messages.length === 0) {
                return '<div class="no-messages">💬 لا توجد رسائل بعد</div>';
            }

            return messages.map(msg => {
                const isMine = msg.sender === currentUser;
                return `
                    <div class="message ${isMine ? 'my-message' : 'other-message'}">
                        ${msg.text}
                        <small>${new Date(msg.createdAt).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })}</small>
                    </div>
                `;
            }).join('');
        }

        async function sendMessage(receiver) {
            const input = document.getElementById(`input-${receiver}`);
            const text = input.value.trim();
            
            if (!text) return;
            
            const message = {
                text: text,
                sender: currentUser,
                receiver: receiver,
                chatId: getChatId(currentUser, receiver),
                createdAt: Date.now()
            };
            
            await sendMessageToAPI(message);
            input.value = '';
            saveInputValue(receiver, '');
            await loadChats();
        }

        async function deleteChat(receiver) {
            if (!confirm('حذف كل الرسائل؟')) return;
            
            const chatId = getChatId(currentUser, receiver);
            await deleteMessagesFromAPI(chatId);
            await loadChats();
        }

        // التحقق من الرسائل الجديدة (بدون مسح النص)
        async function checkNewMessages() {
            if (!currentUser) return;
            
            const messages = await getMessages();
            const others = Object.keys(USERS).filter(u => u !== currentUser);
            
            let needsUpdate = false;
            
            for (const other of others) {
                const chatId = getChatId(currentUser, other);
                const chatMessages = filterMessagesByChat(messages, chatId);
                const currentCount = chatMessages.length;
                const lastCount = lastMessageCount[chatId] || 0;
                
                if (currentCount !== lastCount) {
                    needsUpdate = true;
                    lastMessageCount[chatId] = currentCount;
                }
            }
            
            if (needsUpdate) {
                await loadChats(true); // true = احتفظ بالنص
            }
        }

        // ========== تسجيل الدخول ==========
        async function handleLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (USERS[username] && USERS[username] === password) {
                currentUser = username;
                sessionStorage.setItem('user', currentUser);
                
                loginPage.style.display = 'none';
                chatPage.style.display = 'block';
                currentUserSpan.textContent = currentUser;
                
                await loadChats();
                
                // تحميل آخر عدد للرسائل
                const messages = await getMessages();
                const others = Object.keys(USERS).filter(u => u !== currentUser);
                others.forEach(other => {
                    const chatId = getChatId(currentUser, other);
                    const chatMessages = filterMessagesByChat(messages, chatId);
                    lastMessageCount[chatId] = chatMessages.length;
                });
                
                // فحص الرسائل الجديدة كل 3 ثواني بدون مسح النص
                setInterval(checkNewMessages, 3000);
            } else {
                loginError.textContent = '❌ اسم مستخدم أو كلمة مرور خطأ';
            }
        }

        // ========== تسجيل الخروج ==========
        function logout() {
            currentUser = null;
            sessionStorage.removeItem('user');
            
            loginPage.style.display = 'block';
            chatPage.style.display = 'none';
            usernameInput.value = '';
            passwordInput.value = '';
            loginError.textContent = '';
        }

        // ========== التحقق من الجلسة ==========
        async function checkSession() {
            const savedUser = sessionStorage.getItem('user');
            if (savedUser && USERS[savedUser]) {
                currentUser = savedUser;
                loginPage.style.display = 'none';
                chatPage.style.display = 'block';
                currentUserSpan.textContent = currentUser;
                
                await loadChats();
                
                const messages = await getMessages();
                const others = Object.keys(USERS).filter(u => u !== currentUser);
                others.forEach(other => {
                    const chatId = getChatId(currentUser, other);
                    const chatMessages = filterMessagesByChat(messages, chatId);
                    lastMessageCount[chatId] = chatMessages.length;
                });
                
                setInterval(checkNewMessages, 3000);
            }
        }

        // تشغيل الموقع
        checkSession();
    </script>
</body>
</html>
